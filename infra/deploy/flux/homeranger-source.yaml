# homeranger Flux source + reconciler. Lives in homeranger's OWN bootstrap path.
# Mirrors doxus-infra/deploy/flux-system/gotk-sync.yaml but points at the
# private lynxsyn/homeranger repo and homeranger's pve1 overlay, decrypting with
# homeranger's OWN age secret (sops-age-homeranger) — NOT Doxus's sops-age.
#
# These objects are applied imperatively during bootstrap (see
# infra/deploy/flux/README.md). They are NOT part of Doxus's root Flux graph;
# they register an independent GitRepository + Kustomization in flux-system on
# the SAME shared k3s cluster, scoped entirely to homeranger resources.
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: homeranger
  namespace: flux-system
spec:
  interval: 1m0s
  ref:
    branch: main
  secretRef:
    name: homeranger-git-deploy-key
  url: ssh://git@github.com/lynxsyn/homeranger
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: homeranger
  namespace: flux-system
  labels:
    environment: pve1
    owner: homeranger
spec:
  interval: 10m0s
  retryInterval: 2m
  timeout: 10m
  path: ./infra/deploy/overlays/pve1
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: homeranger
  decryption:
    provider: sops
    secretRef:
      name: sops-age-homeranger
  healthChecks:
    - apiVersion: v1
      kind: Namespace
      name: homeranger
    - apiVersion: apps/v1
      kind: Deployment
      name: homeranger-postgres
      namespace: homeranger
    - apiVersion: apps/v1
      kind: Deployment
      name: homeranger-redis
      namespace: homeranger
