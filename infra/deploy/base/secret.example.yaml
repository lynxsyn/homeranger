# PLAINTEXT TEMPLATE — never commit with real values (commit only secret.enc.yaml).
#
# Source-of-truth list of every runtime/bootstrap secret key homeranger needs.
# Workflow (mirrors Doxus's SOPS pattern):
#   1. cp infra/deploy/base/secret.example.yaml infra/deploy/base/secret.enc.yaml
#   2. fill real values under stringData
#   3. SOPS_AGE_KEY_FILE=~/.config/sops/age/homeranger.txt \
#        sops --encrypt --in-place infra/deploy/base/secret.enc.yaml
#      (.sops.yaml's `\.enc\.yaml$` rule + homeranger age recipient apply automatically)
#   4. verify a `sops:` block exists, commit ONLY the encrypted secret.enc.yaml.
#
# Decisions LOCKED: email=Resend, embeddings=Voyage voyage-3.5 (vector(1024)),
# object store=Cloudflare R2, auth=Supabase Auth (multi-user, JWKS-verified in
# process; no SuperTokens), NO compliant-API channel.
apiVersion: v1
kind: Secret
metadata:
  name: homeranger-secret
  namespace: homeranger
type: Opaque
stringData:
  # --- Postgres bootstrap superuser (pgvector image entrypoint, first boot) ---
  POSTGRES_USER: "REPLACE_ME"            # bootstrap superuser name (e.g. homeranger_admin)
  POSTGRES_PASSWORD: "REPLACE_ME"        # bootstrap superuser password
  # --- Postgres login roles (created by postgres-init-roles Job) ---
  HOMERANGER_APP_PASSWORD: "REPLACE_ME"        # password for the `homeranger` app role
  HOMERANGER_MIGRATOR_PASSWORD: "REPLACE_ME"   # password for the `homeranger_migrator` role
  # --- Prisma connection strings (must embed the role passwords above) ---
  # postgresql://homeranger:<HOMERANGER_APP_PASSWORD>@homeranger-postgres.homeranger.svc.cluster.local:5432/homeranger
  DATABASE_URL: "REPLACE_ME"
  # postgresql://homeranger_migrator:<HOMERANGER_MIGRATOR_PASSWORD>@homeranger-postgres.homeranger.svc.cluster.local:5432/homeranger
  MIGRATION_DATABASE_URL: "REPLACE_ME"
  # --- Redis (BullMQ + ioredis) ---
  REDIS_PASSWORD: "REPLACE_ME"
  # --- Auth: Supabase (multi-user) ---
  # ctx.user is built from the Supabase access token, verified in-process via
  # jose against the project JWKS. SUPABASE_URL + SUPABASE_JWT_AUD are PUBLIC and
  # live as PLAIN env in api-deployment.yaml (not here) — the runtime needs NO
  # Supabase secret (the JWKS is public). Setting SUPABASE_URL turns OFF the dev
  # bypass in prod. ALLOWED_USER_EMAIL is reused as the OPERATOR email (the NULL
  # data namespace the automation engine reads). CF_ACCESS_* are NO LONGER read
  # by the app (Supabase replaced the single-email gate); they remain only for
  # the post-release-verify service token and can be retired with the access.tf
  # cutover that relaxes the CF Access policy so non-operator users can reach the
  # app. To activate multi-user sign-in in prod: (1) relax/remove the CF Access
  # single-email policy, (2) set repo vars VITE_SUPABASE_URL + VITE_SUPABASE_ANON_KEY.
  CF_ACCESS_TEAM_DOMAIN: ""   # legacy — unused by the app (kept for the verify service token)
  CF_ACCESS_AUD: ""           # legacy — unused by the app
  ALLOWED_USER_EMAIL: ""      # the operator's email → the NULL (automation) namespace
  DEV_USER_EMAIL: "dev@homeranger.local"  # dev-bypass identity (also operator fallback)
  # --- LLM / embeddings ---
  ANTHROPIC_API_KEY: "REPLACE_ME"        # metered Anthropic key (NOT a Max subscription) — needed M4/M5
  VOYAGE_API_KEY: "REPLACE_ME"           # Voyage AI key — model voyage-3.5 => vector(1024)
  # --- Cloudflare AI Gateway (OPTIONAL transparent proxy in front of Anthropic) ---
  # Routes the LLM calls through a CF gateway for token/cost analytics, caching,
  # retries and a request log — WITHOUT changing the model. Leave BOTH ids empty
  # to call Anthropic directly (the gateway stays off; nothing breaks). Provisioned
  # by infra/terraform/cloudflare/ai-gateway.tf. Account id = the CF account hash
  # (same account as R2, in R2_ENDPOINT); gateway id = the ai_gateway_id output
  # (default "homeranger"). Token is needed ONLY when the gateway is authentication=true.
  CF_AI_GATEWAY_ACCOUNT_ID: ""           # CF account id (32-char hex) — set WITH the id below to enable the gateway
  CF_AI_GATEWAY_ID: ""                   # AI Gateway slug (ai-gateway.tf output ai_gateway_id, default "homeranger")
  CF_AI_GATEWAY_TOKEN: ""                # cf-aig-authorization bearer — only for authenticated gateways; else empty
  # --- Email (Resend, behind EmailProvider iface) ---
  # Resend signs webhooks with Svix. The "secret" is the Svix signing secret
  # shown in the Resend dashboard when you add the endpoint — it looks like
  # `whsec_<base64>`. Both routes verify the Svix scheme (webhook-id /
  # webhook-timestamp / webhook-signature headers) against these secrets; they
  # are NOT a homemade HMAC key. Resend issues a SEPARATE signing secret per
  # endpoint, so the inbound-parse endpoint and the delivery/event endpoint get
  # distinct whsec_ values — hence two keys here.
  RESEND_API_KEY: "REPLACE_ME"           # Resend API key (used by M6 sending; present now for completeness)
  RESEND_INBOUND_WEBHOOK_SECRET: "REPLACE_ME"  # whsec_… Svix signing secret for the inbound-parse endpoint — M4
  RESEND_WEBHOOK_SECRET: "REPLACE_ME"    # whsec_… Svix signing secret for the delivery/event endpoint — M4
  # --- M6 outbound outreach ---
  # RESEND_FROM = the VERIFIED sending address (the homeranger sending domain set
  # up via cloudflare/dns.tf DKIM/SPF/DMARC), e.g. "HomeRanger <buyer@mail.example>".
  # Resolved lazily by OutreachService — outreach SENDS fail (logged) until set,
  # but the worker still boots + runs inbound/analyze. M6.
  RESEND_FROM: "REPLACE_ME"
  # UNSUBSCRIBE_TOKEN_SECRET = HMAC key for the RFC 8058 one-click unsubscribe
  # token. The PROCESSOR signs and the API verifies, so BOTH pods must carry the
  # SAME value (>= 16 random bytes). Required in production (the code throws if
  # unset under NODE_ENV=production); the unsubscribe route + outreach sends are
  # inert until it is set. M6.
  UNSUBSCRIBE_TOKEN_SECRET: "REPLACE_ME"
  # --- Object store (Cloudflare R2, S3-compatible) — attachments, M4 ---
  # The bucket homeranger-attachments is provisioned by
  # infra/terraform/cloudflare/r2.tf. R2_ENDPOINT is the ACCOUNT-level S3 API
  # endpoint (NOT a per-bucket URL): https://<account-id>.r2.cloudflarestorage.com
  # The worker's storage-config reads exactly these key names (R2_ACCESS_KEY_ID
  # / R2_SECRET_ACCESS_KEY / R2_BUCKET / R2_ENDPOINT). NOTE: Doxus's
  # storage-config used R2_BUCKET_NAME + R2_S3_ENDPOINT (or S3_* aliases);
  # homeranger standardises on R2_BUCKET + R2_ENDPOINT — keep the homeranger
  # storage-config reading these names to match this secret + the deployment env.
  R2_ACCESS_KEY_ID: "REPLACE_ME"
  R2_SECRET_ACCESS_KEY: "REPLACE_ME"
  R2_BUCKET: "homeranger-attachments"     # provisioned by cloudflare/r2.tf
  R2_ENDPOINT: "REPLACE_ME"              # https://<account-id>.r2.cloudflarestorage.com
  # --- Agent discovery (Serper) — M7/M8 ---
  # SERPER_API_KEY powers the SerperAgentDiscoveryProvider — Google SERP via
  # serper.dev for agent discovery, with an in-process HTTP page fetch (no
  # Firecrawl, no per-call scrape credits). optional:true + construction-safe, so
  # the worker boots without it and discovery activates once set. Free <=2,500
  # searches/month, then $1/1k. Get a key at https://serper.dev. (Firecrawl was
  # decommissioned 2026-06-06 — discovery + listing scrape are both in-process.)
  SERPER_API_KEY: "REPLACE_ME"           # serper.dev API key (agent discovery)
  # --- Email deliverability verification (NeverBounce) — discovery ---
  # Powers NeverBounceEmailVerifier: discovery checks each scraped agent address
  # (v4 single-check over HTTPS) so a confident-dead mailbox is flagged
  # undeliverable + never bounced. NeverBounce probes from REPUTABLE IPs — the
  # in-house SMTP probe is policy-blocked from this Spamhaus-PBL cluster IP.
  # optional:true; the verifier fail-opens to "unknown" (sendable) without it, so
  # the worker boots + discovery runs. ACTIVATION = set this key here AND keep
  # EMAIL_VERIFY_PROVIDER=neverbounce (already in processor-deployment.yaml). Get a
  # key at https://neverbounce.com (pay-as-you-go, free trial; ~$0.003-0.008/email).
  NEVERBOUNCE_API_KEY: "REPLACE_ME"      # NeverBounce API key (email deliverability, FALLBACK)
  # --- Email deliverability verification (ZeroBounce) — DEFAULT provider ---
  # Powers ZeroBounceEmailVerifier (EMAIL_VERIFY_PROVIDER=zerobounce, the default
  # in processor-deployment.yaml). v2 /validate over HTTPS; probes from REPUTABLE
  # IPs; resolves more catch-alls than NeverBounce; recurring free tier (~100/mo)
  # covers our volume. optional:true; the verifier fail-opens to "unknown"
  # (sendable) without it. ACTIVATION = set this key here (the provider env is
  # already wired). Get a key at https://zerobounce.net (free signup).
  ZEROBOUNCE_API_KEY: "REPLACE_ME"       # ZeroBounce API key (email deliverability, DEFAULT)
