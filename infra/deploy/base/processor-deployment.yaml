# homeranger-processor Deployment + headless Service + ServiceMonitor.
#
# M4 brings apps/processor up as a BullMQ consumer (the way M3 brought up
# api/web). Pattern from doxus-infra worker-deployment.yaml, scoped to homeranger
# and SIMPLIFIED:
#   - Doxus runs the worker off the SHARED doxus-api image with a CMD override
#     (`node ./apps/processor/dist/worker.js`). homeranger ships a DEDICATED
#     image ghcr.io/lynxsyn/homeranger-processor (apps/processor/Dockerfile), so
#     there is no command override — the image CMD already runs the worker.
#   - NO prisma-migrate init container. The api Deployment owns migrations
#     (apps/api/Dockerfile + its prisma-migrate init container); the processor
#     only waits for postgres TCP, then consumes.
#   - Single replica (single-user product, low inbound volume). BullMQ workers
#     are safe to scale later — jobs are claimed atomically per-message.
#   - No external ingress (allow-homeranger-processor in networkpolicy.yaml is
#     egress-only). Metrics on 9090 are scraped in-cluster by the ServiceMonitor.
#
# CHICKEN-AND-EGG: ghcr.io/lynxsyn/homeranger-processor:<tag> MUST exist in GHCR
# before Flux reconciles this pod or it ImagePullBackOffs. The release.yml matrix
# gains `processor` in M4 so the tag is built+pushed at the release tag; Flux's
# ImageUpdateAutomation then rewrites the $imagepolicy marker below.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: homeranger-processor
  namespace: homeranger
  labels:
    app.kubernetes.io/name: homeranger-processor
    app.kubernetes.io/part-of: homeranger-app
    app.kubernetes.io/component: worker
spec:
  revisionHistoryLimit: 3
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: homeranger-processor
  template:
    metadata:
      labels:
        app.kubernetes.io/name: homeranger-processor
        app.kubernetes.io/part-of: homeranger-app
        app.kubernetes.io/component: worker
    spec:
      terminationGracePeriodSeconds: 60
      automountServiceAccountToken: false
      priorityClassName: platform-critical
      imagePullSecrets:
        - name: ghcr-pull-secret
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        # Block until Postgres accepts TCP. The api Deployment runs the
        # prisma-migrate init container; the processor just needs the DB reachable.
        - name: wait-for-postgres
          image: busybox:1.36.1
          command:
            - sh
            - -ec
            - |
              host="homeranger-postgres.homeranger.svc.cluster.local"
              port="5432"
              attempts=150
              i=1
              while [ "$i" -le "$attempts" ]; do
                if nc -z -w 2 "$host" "$port"; then
                  echo "PostgreSQL is reachable at ${host}:${port}"
                  exit 0
                fi
                echo "Waiting for PostgreSQL at ${host}:${port} (${i}/${attempts})"
                i=$((i + 1))
                sleep 2
              done
              echo "Timed out waiting for PostgreSQL at ${host}:${port}" >&2
              exit 1
          resources:
            requests:
              cpu: 5m
              memory: 8Mi
            limits:
              cpu: 50m
              memory: 32Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            runAsGroup: 65534
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
      containers:
        - name: processor
          image: ghcr.io/lynxsyn/homeranger-processor:0.22.0 # {"$imagepolicy": "flux-system:homeranger-processor"}
          imagePullPolicy: Always
          ports:
            - name: metrics
              containerPort: 9090
              protocol: TCP
          env:
            - name: NODE_ENV
              value: production
            - name: METRICS_PORT
              value: "9090"
            - name: METRICS_HOST
              value: "0.0.0.0"
            # BullMQ/ioredis connect via REDIS_URL. homeranger-redis requires a
            # password (redis.yaml --requirepass), so REDIS_URL embeds it via
            # the $(VAR) reference expansion (REDIS_PASSWORD must be declared
            # FIRST so the kubelet can substitute it). Mirrors doxus worker env.
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: homeranger-secret
                  key: REDIS_PASSWORD
            - name: REDIS_URL
              value: "redis://:$(REDIS_PASSWORD)@homeranger-redis.homeranger.svc.cluster.local:6379"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: homeranger-secret
                  key: DATABASE_URL
            # LLM structured extraction (ClaudeExtractionProvider).
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: homeranger-secret
                  key: ANTHROPIC_API_KEY
            # Cloudflare AI Gateway (OPTIONAL transparent proxy for the LLM calls
            # — analytics + caching + retries + logging; provisioned by
            # infra/terraform/cloudflare/ai-gateway.tf). All three are
            # optional:true so a secret WITHOUT these keys still starts the pod —
            # the app then calls Anthropic directly (lib/ai/ai-gateway.ts treats
            # empty/missing as "off"). Set ACCOUNT_ID + ID together to enable;
            # TOKEN only for an authenticated gateway.
            - name: CF_AI_GATEWAY_ACCOUNT_ID
              valueFrom:
                secretKeyRef:
                  name: homeranger-secret
                  key: CF_AI_GATEWAY_ACCOUNT_ID
                  optional: true
            - name: CF_AI_GATEWAY_ID
              valueFrom:
                secretKeyRef:
                  name: homeranger-secret
                  key: CF_AI_GATEWAY_ID
                  optional: true
            - name: CF_AI_GATEWAY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: homeranger-secret
                  key: CF_AI_GATEWAY_TOKEN
                  optional: true
            # Voyage embeddings — DedupService embedding fallback (M4) + M5 scoring.
            - name: VOYAGE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: homeranger-secret
                  key: VOYAGE_API_KEY
            # M5 analysis cost controls (AC#5). The kill-switch FLAG hard-stops
            # all analysis when "1"; the monthly BUDGET (integer pence; 0 =
            # disabled) short-circuits once the month's persisted PhotoAnalysis
            # spend reaches it. Both default safe (off) — set the budget to opt
            # into a hard monthly ceiling. (ANALYSIS_FAKE is E2E/CI-only — never
            # set in prod; absent here so the real Haiku/Voyage providers run.)
            - name: ANALYSIS_KILL_SWITCH
              value: "0"
            - name: ANALYSIS_MONTHLY_BUDGET_PENCE
              value: "0"
            # Cloudflare R2 (S3-compatible) — attachment object store. The
            # storage-config reads R2_ACCESS_KEY_ID / R2_SECRET_ACCESS_KEY /
            # R2_BUCKET / R2_ENDPOINT (the homeranger key names; storage-config
            # also accepts the S3_* aliases but homeranger uses R2_*).
            - name: R2_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: homeranger-secret
                  key: R2_ACCESS_KEY_ID
            - name: R2_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: homeranger-secret
                  key: R2_SECRET_ACCESS_KEY
            - name: R2_BUCKET
              valueFrom:
                secretKeyRef:
                  name: homeranger-secret
                  key: R2_BUCKET
            - name: R2_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: homeranger-secret
                  key: R2_ENDPOINT
            # Worker hydrates inbound emails via the Resend API (metadata-only
            # webhook → emails.receiving.get + attachments). RealResendHydrator
            # constructs `new Resend(RESEND_API_KEY)` at boot.
            - name: RESEND_API_KEY
              valueFrom:
                secretKeyRef:
                  name: homeranger-secret
                  key: RESEND_API_KEY
            # M6 outbound outreach. RESEND_FROM = the verified sending address;
            # UNSUBSCRIBE_TOKEN_SECRET = the HMAC key for one-click unsubscribe
            # (MUST be the SAME value the api uses so processor-signed tokens
            # verify there). Both optional:true so a secret WITHOUT them still
            # boots the worker — OutreachService resolves RESEND_FROM lazily, so
            # only outreach SENDS fail (logged) until the operator adds them; the
            # inbound/analyze/recompute queues are unaffected.
            - name: RESEND_FROM
              valueFrom:
                secretKeyRef:
                  name: homeranger-secret
                  key: RESEND_FROM
                  optional: true
            - name: UNSUBSCRIBE_TOKEN_SECRET
              valueFrom:
                secretKeyRef:
                  name: homeranger-secret
                  key: UNSUBSCRIBE_TOKEN_SECRET
                  optional: true
            # UNSUBSCRIBE_BASE_URL pins the RFC-8058 one-click unsubscribe link
            # to the apex (homeranger.app), where it is Access-bypassed. The
            # processor SENDS outreach, so it embeds this URL at send time. Set
            # explicitly (not relying on the code default) so the RUNNING pod
            # emits apex links immediately, independent of which image tag is
            # deployed — no app.homeranger.app link survives the apex cutover.
            - name: UNSUBSCRIBE_BASE_URL
              value: https://homeranger.app/api/outreach/unsubscribe
            # M7/M8 agent discovery. FIRECRAWL_API_KEY powers the real
            # FirecrawlAgentDiscoveryProvider (web search → estate-agent emails).
            # optional:true + the provider is construction-safe (boots without
            # it; discover() throws retryable:false → drops the job) so discovery
            # stays dormant until the operator adds the key, then activates with
            # no redeploy. Search launches query Firecrawl by the search's PLACE
            # NAME (v0.13.0), so real launches now find agents UK-wide.
            - name: FIRECRAWL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: homeranger-secret
                  key: FIRECRAWL_API_KEY
                  optional: true
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1024Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          # worker.ts serves GET /health on the metrics port, started LAST after
          # the DB + Redis pings succeed — so a 200 here is real readiness (not
          # merely a bound socket). Mirrors the api's /api/health probes.
          startupProbe:
            httpGet:
              path: /health
              port: metrics
            initialDelaySeconds: 0
            periodSeconds: 2
            failureThreshold: 60
          livenessProbe:
            httpGet:
              path: /health
              port: metrics
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: metrics
            periodSeconds: 10
            failureThreshold: 3
      volumes:
        - name: tmp
          emptyDir: {}
---
# Headless Service exposing the worker's /metrics port for the ServiceMonitor.
apiVersion: v1
kind: Service
metadata:
  name: homeranger-processor
  namespace: homeranger
  labels:
    app.kubernetes.io/name: homeranger-processor
    app.kubernetes.io/part-of: homeranger-app
    app.kubernetes.io/component: worker
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - name: metrics
      port: 9090
      targetPort: metrics
      protocol: TCP
  selector:
    app.kubernetes.io/name: homeranger-processor
---
# Prometheus scrape of the worker /metrics endpoint. The cluster's
# kube-prometheus-stack (installed by Doxus's Flux graph — homeranger consumes,
# never installs) discovers this via the `release: kube-prometheus-stack` label.
# If the ServiceMonitor CRD is not present in this cluster, drop this document
# (the Deployment + Service still work) — but Doxus already installs it.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: homeranger-processor
  namespace: homeranger
  labels:
    app.kubernetes.io/name: homeranger-processor
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: homeranger-processor
  endpoints:
    - port: metrics
      path: /metrics
      interval: 15s
  namespaceSelector:
    matchNames:
      - homeranger
