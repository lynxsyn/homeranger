# homeranger NetworkPolicies.
#
# Model: DEFAULT-DENY ingress AND egress for the whole namespace, then explicit
# per-component allows. This mirrors the Doxus base network-policies.yaml pattern
# verbatim but is scoped entirely to the `homeranger` namespace and homeranger's
# own pods/services. homeranger shares ZERO runtime with Doxus: its allows only
# reference homeranger-namespace pods, kube-dns, and external 443. Nothing here
# permits reaching the Doxus `web` namespace (see networkpolicy notes).
#
# Component -> Doxus analogue:
#   homeranger-api        <- doxus-api
#   homeranger-scheduler  <- doxus-api-scheduler
#   homeranger-processor  <- doxus-worker (BullMQ job execution + provider egress)
#   homeranger-postgres   <- doxus-postgres
#   homeranger-redis      <- doxus-redis
#   cloudflared          <- cloudflared
#
# Auth is Supabase (the access token verified in-process via jose against the
# project JWKS), so there is NO SuperTokens pod/egress — the M1-skeleton
# allow-supertokens policy + the homeranger-api→supertokens:3567 egress rule
# were removed at M3. The Supabase JWKS is reached over the existing 443 egress.
#
# DNS egress is scoped to kube-system / k8s-app: kube-dns (the stricter pattern
# from Doxus's postgres-init-netpol.yaml), not unscoped port 53. coredns in this
# cluster is labelled k8s-app: kube-dns in kube-system.
---
# Default deny all ingress and egress in the homeranger namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: homeranger
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
# Shared DNS egress allow: every homeranger pod may reach kube-dns. Applied via a
# namespace-wide podSelector so each component policy below does not need to
# repeat the DNS rule. (Egress rules across policies are additive in k8s.)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: homeranger
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
---
# homeranger-api: ingress from cloudflared (HTTP API on 3000); egress to postgres,
# redis, and external HTTPS (Resend / Voyage / Anthropic + the Supabase JWKS
# endpoint). DNS handled by allow-dns-egress.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-homeranger-api
  namespace: homeranger
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: homeranger-api
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: cloudflared
      ports:
        - port: 3000
          protocol: TCP
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: homeranger-postgres
      ports:
        - port: 5432
          protocol: TCP
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: homeranger-redis
      ports:
        - port: 6379
          protocol: TCP
    # External HTTPS: Resend, Voyage, Anthropic, AND the Supabase Auth JWKS
    # endpoint (https://<ref>.supabase.co/auth/v1/.well-known/jwks.json)
    # the jose verifier fetches. k8s NetworkPolicy CANNOT match hostnames, so
    # this is broad egress to 443. See networkpolicy notes.
    - ports:
        - port: 443
          protocol: TCP
---
# homeranger-scheduler: no external ingress; egress to postgres + redis only.
# Business job execution lives in homeranger-processor.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-homeranger-scheduler
  namespace: homeranger
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: homeranger-scheduler
  policyTypes:
    - Ingress
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: homeranger-postgres
      ports:
        - port: 5432
          protocol: TCP
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: homeranger-redis
      ports:
        - port: 6379
          protocol: TCP
---
# homeranger-processor (BullMQ worker): no external ingress; egress to postgres,
# redis, and external HTTPS providers (Resend / Voyage / Anthropic).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-homeranger-processor
  namespace: homeranger
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: homeranger-processor
  policyTypes:
    - Ingress
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: homeranger-postgres
      ports:
        - port: 5432
          protocol: TCP
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: homeranger-redis
      ports:
        - port: 6379
          protocol: TCP
    # External HTTPS: Resend email, Voyage embeddings, Anthropic API, the Serper
    # SERP API, and HTTPS agency contact-page fetches (Serper discovery).
    # Hostname matching is impossible in k8s NetworkPolicy; broad 443 egress.
    # Port 80 is also allowed: many UK agency sites serve/redirect via plain HTTP,
    # so the in-process discovery fetcher needs it to reach those contact pages.
    - ports:
        - port: 443
          protocol: TCP
        - port: 80
          protocol: TCP
---
# homeranger-postgres: ingress from api, scheduler, processor only.
# No egress (default-deny egress applies; DNS not needed by postgres itself).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-homeranger-postgres
  namespace: homeranger
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: homeranger-postgres
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: homeranger-api
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: homeranger-scheduler
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: homeranger-processor
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: postgres-init
      ports:
        - port: 5432
          protocol: TCP
  egress: []
---
# homeranger-redis: ingress from api, scheduler, processor only. No egress.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-homeranger-redis
  namespace: homeranger
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: homeranger-redis
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: homeranger-api
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: homeranger-scheduler
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: homeranger-processor
      ports:
        - port: 6379
          protocol: TCP
  egress: []
---
# cloudflared: egress to Cloudflare edge (QUIC 7844 + HTTPS 443 fallback) and to
# internal homeranger-api on 3000. No external ingress (tunnel is outbound-only).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-cloudflared
  namespace: homeranger
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: cloudflared
  policyTypes:
    - Ingress
    - Egress
  egress:
    # Cloudflare edge - QUIC (preferred)
    - ports:
        - port: 7844
          protocol: UDP
        - port: 7844
          protocol: TCP
    # Cloudflare edge - HTTPS fallback
    - ports:
        - port: 443
          protocol: TCP
    # Internal: homeranger-api (/api, /ws, and the Resend webhook hosts)
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: homeranger-api
      ports:
        - port: 3000
          protocol: TCP
    # Internal: homeranger-web (the SPA — tunnel ingress routes "/" here)
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: homeranger-web
      ports:
        - port: 8080
          protocol: TCP
---
# homeranger-web: ingress from cloudflared only (the SPA is served exclusively
# through the tunnel; no other in-cluster client reaches it). Egress is just DNS
# (allow-dns-egress) — nginx serves static files and proxies nothing server-side.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-homeranger-web
  namespace: homeranger
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: homeranger-web
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: cloudflared
      ports:
        - port: 8080
          protocol: TCP
  egress: []
---
# postgres-init Job: egress to homeranger-postgres for role + extension
# provisioning. DNS via the namespace-wide allow-dns-egress. Mirrors Doxus's
# overlays/pve1/base-overlay/postgres-init-netpol.yaml. Without this, the
# default-deny egress blocks the Job (its pod matches no app-name allow).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-postgres-init
  namespace: homeranger
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: postgres-init
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: homeranger-postgres
      ports:
        - port: 5432
          protocol: TCP
