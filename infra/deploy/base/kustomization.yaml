# homeranger base kustomization.
#
# M1 shipped the data layer (namespace + isolation + secret + postgres + redis).
# M3 adds the api + web Deployments, the GHCR pull secret, and Flux image
# automation.
#
# CHICKEN-AND-EGG (read before reconciling): the api/web Deployments reference
# ghcr.io/lynxsyn/homeranger-{api,web} images that MUST exist in GHCR before Flux
# deploys the pods, or they ImagePullBackOff. The orchestrator's apply ordering
# is: (1) build + push both images at the release tag, (2) create + SOPS-encrypt
# ghcr-secret.enc.yaml, (3) THEN let Flux reconcile this kustomization. The
# api/web/image-automation entries below are authored now; the orchestrator
# controls when the first reconcile happens (it does not un-comment anything —
# Flux simply waits on the images, and the pods go Ready once they exist).
#
# secret.enc.yaml + ghcr-secret.enc.yaml are SOPS-encrypted; Flux decrypts them
# in-cluster via the Kustomization's decryption.secretRef (sops-age-homeranger).
# For the imperative pre-merge bootstrap, decrypt locally:
#   `sops -d secret.enc.yaml | kubectl apply -f -`.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - namespace.yaml
  - secret.enc.yaml
  - networkpolicy.yaml
  - postgres-pvc-longhorn.yaml
  - postgres.yaml
  - postgres-init-roles.yaml
  - redis.yaml
  # M3 app layer. Images are built + pushed to GHCR (static :0.3.0 tags) and the
  # ghcr-pull-secret created BEFORE Flux reconciles, so the pods pull cleanly.
  - ghcr-secret.enc.yaml
  - api-deployment.yaml
  - web-deployment.yaml
  # M4 brings up the BullMQ worker (apps/processor) as a consume-only
  # Deployment. It pulls ghcr.io/lynxsyn/homeranger-processor (built by the
  # release.yml matrix once apps/processor/Dockerfile lands) and is gated by
  # the same chicken-and-egg ordering as the api/web images: build + push the
  # tag FIRST, then let Flux reconcile.
  - processor-deployment.yaml
  # M6 brings up the leader-locked scheduler (apps/scheduler) — Redis-only, no
  # DB. It pulls ghcr.io/lynxsyn/homeranger-scheduler (built by the release.yml
  # matrix once apps/scheduler/Dockerfile lands) under the same chicken-and-egg
  # ordering as the api/web/processor images: build + push the tag FIRST, then
  # let Flux reconcile. The api/web/processor pods are unaffected if the
  # scheduler image is briefly absent.
  - scheduler-deployment.yaml
  # Live edge: the Cloudflare Tunnel connector (app.homeranger.app +
  # hooks.homeranger.app). The tunnel + ingress config + DNS CNAMEs are
  # Terraform-managed (infra/terraform/cloudflare); this is just the in-cluster
  # connector that dials out and pulls its config via TUNNEL_TOKEN. The token
  # secret is SOPS-encrypted and decrypted in-cluster by Flux.
  - cloudflared-secret.enc.yaml
  - cloudflared.yaml
  # Flux image-automation (auto-bump from GHCR) stays DEFERRED — M4 ships on
  # static :0.4.0 tags. Two unmet cluster prereqs block enabling it: (1)
  # image-automation.yaml's ImageUpdateAutomation uses apiVersion v1beta1, but
  # this cluster only serves v1 / v1beta2; (2) a ghcr-pull-secret-flux must exist
  # in flux-system so the ImageRepository can scan the private GHCR. A later
  # milestone fixes the apiVersion + creates that secret, then uncomments this.
  # - image-automation.yaml
