# homeranger-web Deployment + Service. nginx static SPA on 8080 (matches the
# Dockerfile EXPOSE, the Service port, and tunnel.tf's web ingress target).
# Read-only rootfs with emptyDir mounts for nginx's writable cache/run/tmp dirs;
# runs as the nginx-alpine uid (101).
#
# CHICKEN-AND-EGG: the image must exist in GHCR before Flux deploys this pod.
# Build + push ghcr.io/lynxsyn/homeranger-web:<tag> FIRST.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: homeranger-web
  namespace: homeranger
  labels:
    app.kubernetes.io/name: homeranger-web
    app.kubernetes.io/part-of: homeranger-app
spec:
  revisionHistoryLimit: 3
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: homeranger-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: homeranger-web
        app.kubernetes.io/part-of: homeranger-app
    spec:
      automountServiceAccountToken: false
      priorityClassName: platform-critical
      imagePullSecrets:
        - name: ghcr-pull-secret
      securityContext:
        runAsNonRoot: true
        runAsUser: 101 # nginx (alpine)
        fsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: web
          image: ghcr.io/lynxsyn/homeranger-web:0.35.0 # {"$imagepolicy": "flux-system:homeranger-web"}
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run/nginx
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: homeranger-web
  namespace: homeranger
  labels:
    app.kubernetes.io/name: homeranger-web
    app.kubernetes.io/part-of: homeranger-app
spec:
  selector:
    app.kubernetes.io/name: homeranger-web
  ports:
    - name: http
      port: 8080
      targetPort: http
