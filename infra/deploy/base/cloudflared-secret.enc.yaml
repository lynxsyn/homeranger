# Cloudflare Tunnel connector token for the homescout tunnel
# (cloudflare_zero_trust_tunnel_cloudflared.homescout, id 2ea600e0-eef1-4395-857a-e09c94da3f19).
# Retrieved via GET /accounts/{account}/cfd_tunnel/{tunnel}/token. The
# cloudflared Deployment reads TUNNEL_TOKEN from here and pulls its ingress
# config remotely (config_src = "cloudflare"), so there is no in-cluster
# config.yaml. Rotate by deleting + recreating the tunnel token in Cloudflare
# and re-running `sops set` on this key. SOPS-encrypted to the homescout age
# recipient; Flux decrypts in-cluster via decryption.secretRef sops-age-homescout.
apiVersion: v1
kind: Secret
metadata:
    name: cloudflared-tunnel-token
    namespace: homescout
    labels:
        app.kubernetes.io/name: cloudflared
        app.kubernetes.io/part-of: homescout-app
type: Opaque
stringData:
    TUNNEL_TOKEN: ENC[AES256_GCM,data:,iv:OSSMbXKpGMetW1b1wJYrrhMpdeBkBnWyklDy8YbCwF0=,tag:O03qjWW2byJ3OdCskGjlbw==,type:str]
