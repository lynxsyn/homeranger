# PLAINTEXT TEMPLATE — never commit with real values (commit only the SOPS
# .enc.yaml). Two GHCR pull secrets are needed:
#
#   ghcr-pull-secret       (namespace: homeranger)    — kubelet pulls the app
#                                                       images for the api/web pods.
#   ghcr-pull-secret-flux  (namespace: flux-system)  — the image-reflector
#                                                       controller scans GHCR tags.
#
# Workflow (mirrors secret.example.yaml):
#   1. cp ghcr-secret.example.yaml ghcr-secret.enc.yaml
#   2. fill the base64 dockerconfigjson under .dockerconfigjson for a GHCR PAT
#      with read:packages (encode: kubectl create secret docker-registry … \
#        --docker-server=ghcr.io --docker-username=lynxsyn --docker-password=<PAT> \
#        --dry-run=client -o yaml).
#   3. SOPS_AGE_KEY_FILE=~/.config/sops/age/homeranger.txt \
#        sops --encrypt --in-place ghcr-secret.enc.yaml
#      (.sops.yaml's `\.enc\.yaml$` rule + the homeranger age recipient apply).
#   4. commit ONLY ghcr-secret.enc.yaml.
#
# The kustomization references ghcr-secret.enc.yaml — create it before Flux
# reconciles, or the app pods ImagePullBackOff.
apiVersion: v1
kind: Secret
metadata:
  name: ghcr-pull-secret
  namespace: homeranger
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: REPLACE_ME_BASE64_DOCKERCONFIGJSON
---
apiVersion: v1
kind: Secret
metadata:
  name: ghcr-pull-secret-flux
  namespace: flux-system
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: REPLACE_ME_BASE64_DOCKERCONFIGJSON
