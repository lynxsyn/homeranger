# homescout-api Deployment + Service. Pattern from doxus-infra api-deployment,
# scoped to homescout: single replica, wait-for-postgres + prisma-migrate init
# containers, /api/health probes on 3000, secrets from homescout-secret.
#
# Auth is Cloudflare Access (CF_ACCESS_* + ALLOWED_USER_EMAIL from the secret).
# For M3 those keys are EMPTY in the secret → the api takes the dev-bypass path
# (ctx.user = { email: DEV_USER_EMAIL }); M4 sets them with the tunnel. There is
# NO SuperTokens env or sidecar.
#
# CHICKEN-AND-EGG: the image must exist in GHCR before Flux deploys this pod, or
# the pod ImagePullBackOffs. The orchestrator builds + pushes ghcr.io/lynxsyn/
# homescout-api:<tag> FIRST, then lets Flux reconcile this manifest. The
# $imagepolicy marker is rewritten by the ImageUpdateAutomation (image-automation.yaml).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: homescout-api
  namespace: homescout
  labels:
    app.kubernetes.io/name: homescout-api
    app.kubernetes.io/part-of: homescout-app
spec:
  revisionHistoryLimit: 3
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: homescout-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: homescout-api
        app.kubernetes.io/part-of: homescout-app
    spec:
      automountServiceAccountToken: false
      priorityClassName: platform-critical
      imagePullSecrets:
        - name: ghcr-pull-secret
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        # Block until Postgres accepts TCP — Prisma migrate then init can't race
        # the DB coming up on a cold namespace start.
        - name: wait-for-postgres
          image: ghcr.io/lynxsyn/homescout-api:0.4.0 # {"$imagepolicy": "flux-system:homescout-api"}
          imagePullPolicy: Always
          command:
            - sh
            - -c
            - |
              until nc -z homescout-postgres.homescout.svc.cluster.local 5432; do
                echo "waiting for postgres..."; sleep 2;
              done
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
        # Apply migrations as the migrator role before the app boots.
        - name: prisma-migrate
          image: ghcr.io/lynxsyn/homescout-api:0.4.0 # {"$imagepolicy": "flux-system:homescout-api"}
          imagePullPolicy: Always
          workingDir: /app/apps/api
          command: ["npx", "prisma", "migrate", "deploy"]
          env:
            - name: MIGRATION_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: homescout-secret
                  key: MIGRATION_DATABASE_URL
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      containers:
        - name: api
          image: ghcr.io/lynxsyn/homescout-api:0.4.0 # {"$imagepolicy": "flux-system:homescout-api"}
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: HOST
              value: "0.0.0.0"
            - name: NODE_ENV
              value: production
            - name: WEB_ORIGIN
              value: https://app.aid-engineering.com
            # GIT_SHA is baked into the image at BUILD time
            # (apps/api/Dockerfile ARG GIT_SHA ← release.yml build-arg
            # github.sha). It is NOT injected from the image tag here — the tag
            # is a semver (e.g. 0.3.0) and app-mode post-release verify greps
            # /api/version for the 40-char merge SHA. No $imagepolicy marker on
            # this env (the image: tag markers above/below still drive Flux).
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: homescout-secret
                  key: DATABASE_URL
            # M4: the Resend webhook routes ENQUEUE onto BullMQ, so the api needs
            # Redis. REDIS_HOST points at the in-cluster Service; redis-connection
            # builds redis://:<REDIS_PASSWORD>@homescout-redis:6379 from these.
            - name: REDIS_HOST
              value: homescout-redis.homescout.svc.cluster.local
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: homescout-secret
                  key: REDIS_PASSWORD
            # M4: the inbound + events webhook routes verify Svix signatures
            # against these whsec_ secrets (one per Resend endpoint).
            - name: RESEND_INBOUND_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: homescout-secret
                  key: RESEND_INBOUND_WEBHOOK_SECRET
            - name: RESEND_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: homescout-secret
                  key: RESEND_WEBHOOK_SECRET
            # M3: these four keys are NOT yet in homescout-secret (added in M4
            # with the Cloudflare tunnel). `optional: true` lets the kubelet
            # resolve them to UNSET rather than failing with
            # CreateContainerConfigError — unset CF_ACCESS_* takes the api's
            # documented dev-bypass path. M4 adds the real values to the secret
            # AND flips these back to required (a missing prod secret must fail
            # loud, which a non-optional ref guarantees).
            # The live edge populates these in homescout-secret (CF Access app
            # AUD + team domain + the single allowed owner email), so they are
            # now REQUIRED: a prod deploy missing the auth config must fail loud
            # (CreateContainerConfigError) rather than silently take the
            # dev-bypass path. Local/CI/E2E never use this manifest — they run
            # with the trio unset (dev bypass) via env, not this secret.
            - name: CF_ACCESS_TEAM_DOMAIN
              valueFrom:
                secretKeyRef:
                  name: homescout-secret
                  key: CF_ACCESS_TEAM_DOMAIN
            - name: CF_ACCESS_AUD
              valueFrom:
                secretKeyRef:
                  name: homescout-secret
                  key: CF_ACCESS_AUD
            - name: ALLOWED_USER_EMAIL
              valueFrom:
                secretKeyRef:
                  name: homescout-secret
                  key: ALLOWED_USER_EMAIL
            - name: DEV_USER_EMAIL
              valueFrom:
                secretKeyRef:
                  name: homescout-secret
                  key: DEV_USER_EMAIL
                  optional: true
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: homescout-api
  namespace: homescout
  labels:
    app.kubernetes.io/name: homescout-api
    app.kubernetes.io/part-of: homescout-app
spec:
  selector:
    app.kubernetes.io/name: homescout-api
  ports:
    - name: http
      port: 3000
      targetPort: http
