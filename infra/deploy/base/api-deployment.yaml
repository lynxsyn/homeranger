# homeranger-api Deployment + Service. Pattern from doxus-infra api-deployment,
# scoped to homeranger: single replica, wait-for-postgres + prisma-migrate init
# containers, /api/health probes on 3000, secrets from homeranger-secret.
#
# Auth is Supabase (multi-user). ctx.user is built from the Supabase access
# token, verified in-process against the project JWKS. SUPABASE_URL +
# SUPABASE_JWT_AUD are PLAIN env below (public; no runtime secret). With
# SUPABASE_URL unset the api takes the dev-bypass path (ctx.user = the dev
# operator) — set here so prod verifies real tokens. ALLOWED_USER_EMAIL is
# reused as the operator email. No SuperTokens; no CF Access JWT verification.
#
# CHICKEN-AND-EGG: the image must exist in GHCR before Flux deploys this pod, or
# the pod ImagePullBackOffs. The orchestrator builds + pushes ghcr.io/lynxsyn/
# homeranger-api:<tag> FIRST, then lets Flux reconcile this manifest. The
# $imagepolicy marker is rewritten by the ImageUpdateAutomation (image-automation.yaml).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: homeranger-api
  namespace: homeranger
  labels:
    app.kubernetes.io/name: homeranger-api
    app.kubernetes.io/part-of: homeranger-app
spec:
  revisionHistoryLimit: 3
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: homeranger-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: homeranger-api
        app.kubernetes.io/part-of: homeranger-app
    spec:
      automountServiceAccountToken: false
      priorityClassName: platform-critical
      imagePullSecrets:
        - name: ghcr-pull-secret
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        # Block until Postgres accepts TCP — Prisma migrate then init can't race
        # the DB coming up on a cold namespace start.
        - name: wait-for-postgres
          image: ghcr.io/lynxsyn/homeranger-api:0.38.0 # {"$imagepolicy": "flux-system:homeranger-api"}
          imagePullPolicy: Always
          command:
            - sh
            - -c
            - |
              until nc -z homeranger-postgres.homeranger.svc.cluster.local 5432; do
                echo "waiting for postgres..."; sleep 2;
              done
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
        # Apply migrations as the migrator role before the app boots.
        - name: prisma-migrate
          image: ghcr.io/lynxsyn/homeranger-api:0.38.0 # {"$imagepolicy": "flux-system:homeranger-api"}
          imagePullPolicy: Always
          workingDir: /app/apps/api
          command: ["npx", "prisma", "migrate", "deploy"]
          env:
            - name: MIGRATION_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: homeranger-secret
                  key: MIGRATION_DATABASE_URL
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      containers:
        - name: api
          image: ghcr.io/lynxsyn/homeranger-api:0.38.0 # {"$imagepolicy": "flux-system:homeranger-api"}
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: HOST
              value: "0.0.0.0"
            - name: NODE_ENV
              value: production
            - name: WEB_ORIGIN
              value: https://homeranger.app
            # Apex unsubscribe base — Access-bypassed at homeranger.app. Set
            # explicitly so it matches the processor (single source of truth for
            # where the one-click link points) regardless of image tag.
            - name: UNSUBSCRIBE_BASE_URL
              value: https://homeranger.app/api/outreach/unsubscribe
            # GIT_SHA is baked into the image at BUILD time
            # (apps/api/Dockerfile ARG GIT_SHA ← release.yml build-arg
            # github.sha). It is NOT injected from the image tag here — the tag
            # is a semver (e.g. 0.3.0) and app-mode post-release verify greps
            # /api/version for the 40-char merge SHA. No $imagepolicy marker on
            # this env (the image: tag markers above/below still drive Flux).
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: homeranger-secret
                  key: DATABASE_URL
            # M4: the Resend webhook routes ENQUEUE onto BullMQ, so the api needs
            # Redis. REDIS_HOST points at the in-cluster Service; redis-connection
            # builds redis://:<REDIS_PASSWORD>@homeranger-redis:6379 from these.
            - name: REDIS_HOST
              value: homeranger-redis.homeranger.svc.cluster.local
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: homeranger-secret
                  key: REDIS_PASSWORD
            # M4: the inbound + events webhook routes verify Svix signatures
            # against these whsec_ secrets (one per Resend endpoint).
            - name: RESEND_INBOUND_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: homeranger-secret
                  key: RESEND_INBOUND_WEBHOOK_SECRET
            - name: RESEND_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: homeranger-secret
                  key: RESEND_WEBHOOK_SECRET
            # AUTH = Supabase. ctx.user is built from the Supabase access token
            # (Authorization: Bearer) verified against the project JWKS. SETTING
            # SUPABASE_URL is what turns OFF the dev bypass in prod — it MUST be
            # present or the api would resolve every request to the dev operator
            # with no auth. Plain values (the project hostname + the standard
            # "authenticated" audience) — both PUBLIC, no secret needed at
            # runtime (the JWKS is public). Local/CI/E2E run with SUPABASE_URL
            # unset/empty (dev bypass) via env, not this manifest.
            - name: SUPABASE_URL
              value: "https://jdaklyjwxymrahnbuczi.supabase.co"
            - name: SUPABASE_JWT_AUD
              value: "authenticated"
            # ALLOWED_USER_EMAIL is reused as the OPERATOR email — the identity
            # whose data lives in the NULL namespace the automation engine reads
            # (operatorEmail() = OPERATOR_USER_EMAIL ?? ALLOWED_USER_EMAIL ??
            # DEV_USER_EMAIL). Required so the operator maps correctly in prod.
            - name: ALLOWED_USER_EMAIL
              valueFrom:
                secretKeyRef:
                  name: homeranger-secret
                  key: ALLOWED_USER_EMAIL
            - name: DEV_USER_EMAIL
              valueFrom:
                secretKeyRef:
                  name: homeranger-secret
                  key: DEV_USER_EMAIL
                  optional: true
            # M6 one-click unsubscribe (RFC 8058): the HMAC key the api VERIFIES
            # tokens with — MUST be the SAME value the processor SIGNS with, or
            # processor-signed tokens fail verification here. optional:true so the
            # api still boots without it (the unsubscribe route returns 500 +
            # logs until the operator adds it; the rest of the api is unaffected).
            - name: UNSUBSCRIBE_TOKEN_SECRET
              valueFrom:
                secretKeyRef:
                  name: homeranger-secret
                  key: UNSUBSCRIBE_TOKEN_SECRET
                  optional: true
            # Read ONLY to expose the sender display name (outreach.senderName)
            # so the UI email previews sign off like the sent emails do. The api
            # does NOT send — the processor owns sending. optional:true.
            - name: RESEND_FROM
              valueFrom:
                secretKeyRef:
                  name: homeranger-secret
                  key: RESEND_FROM
                  optional: true
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: homeranger-api
  namespace: homeranger
  labels:
    app.kubernetes.io/name: homeranger-api
    app.kubernetes.io/part-of: homeranger-app
spec:
  selector:
    app.kubernetes.io/name: homeranger-api
  ports:
    - name: http
      port: 3000
      targetPort: http
