worker_processes auto;
pid /var/run/nginx/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;

    access_log /dev/stdout;
    error_log /dev/stderr;

    # Temp paths (writable for non-root nginx user).
    client_body_temp_path /tmp/client_body;
    proxy_temp_path /tmp/proxy;
    fastcgi_temp_path /tmp/fastcgi;
    uwsgi_temp_path /tmp/uwsgi;
    scgi_temp_path /tmp/scgi;

    server {
        listen 8080;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        # Common exploit probes should 404 instead of returning the SPA shell.
        location ~* ^/(?:wp-admin(?:/|$)|wp-login\.php$|xmlrpc\.php$|phpmyadmin(?:/|$)) {
            return 404;
        }

        # Hidden files should never be served.
        location ~ /\. {
            return 404;
        }

        # Missing file-like requests 404 instead of falling through to index.html.
        location ~ ^.+\.[^/]+$ {
            try_files $uri =404;
        }

        # SPA routing — serve index.html only for extensionless application routes.
        location / {
            try_files $uri $uri/ @spa;
        }

        location @spa {
            try_files /index.html =404;
        }

        # index.html — never cache (so deployments take effect immediately).
        location = /index.html {
            add_header X-Frame-Options "DENY" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }

        # Hashed assets — long TTL (Vite content-hashes filenames).
        location /assets/ {
            add_header X-Frame-Options "DENY" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }
}
