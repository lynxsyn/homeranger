# homeranger CI — full coverage on every pull request and every push to main:
# secret-scan + typecheck/lint (check) + api-unit (coverage) + web-unit +
# api-integration (real pgvector) + e2e (Playwright). Action SHAs pinned.
#
# aide-drift-check: scripts/check-aide-drift.sh is not wired as a CI job because
# it requires the aide repo at ~/projects/aide (or AIDE_DIR_OVERRIDE pointing to
# a checkout). In CI that checkout is absent, so the script exits 0 with a
# warning — a no-op job. Run it locally or in a dedicated aide-sync workflow
# that checks out aide at the pinned SHA and sets AIDE_DIR_OVERRIDE.
#
# The repo is PUBLIC, so GitHub-hosted Actions minutes are unmetered — there is
# no reason to skip jobs by path or trim the matrix on push. Every job runs on
# every event; the ci-gate job aggregates them into one required-checkable
# status. Flux image-tag commits still bypass CI via their own [skip ci]
# trailer (a commit-message skip, independent of these triggers).
name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secret-scan:
    runs-on: ${{ vars.RUNNER_LABEL_DEFAULT || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          set -euo pipefail
          VERSION=8.24.3
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" -o /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          sudo install /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version
      - name: Scan git history for secrets
        run: gitleaks detect --source . --config .gitleaks.toml --redact --no-banner

  check:
    runs-on: ${{ vars.RUNNER_LABEL_DEFAULT || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.16.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Generate the Prisma client first — backend-core typechecks against the
      # generated @prisma/client (models + enums). prisma.config.ts tolerates a
      # missing MIGRATION_DATABASE_URL, so generate needs no DB.
      - name: Prisma generate
        run: pnpm --filter @homeranger/api prisma:generate
      - name: Typecheck
        run: pnpm typecheck
      - name: Lint
        run: pnpm lint

  api-unit:
    runs-on: ${{ vars.RUNNER_LABEL_DEFAULT || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.16.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Generate the Prisma client so backend-core's @prisma/client imports
      # resolve during the unit run (the drift test imports the generated enums).
      - name: Prisma generate
        env:
          MIGRATION_DATABASE_URL: postgresql://homeranger:homeranger@localhost:5432/homeranger_test
        run: pnpm --filter @homeranger/api prisma:generate
      - name: Unit tests + coverage
        run: pnpm test:coverage

  web-unit:
    runs-on: ${{ vars.RUNNER_LABEL_DEFAULT || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.16.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Web tests mock the tRPC client + use pure helpers — type-only imports of
      # backend-core/shared are erased by esbuild at test runtime, so no Prisma
      # client or DB is needed (unlike api-unit).
      - name: Web unit tests (happy-dom + testing-library)
        run: pnpm --filter @homeranger/web test

  api-integration:
    runs-on: ${{ vars.RUNNER_LABEL_DEFAULT || 'ubuntu-latest' }}
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_DB: homeranger_test
          POSTGRES_USER: homeranger
          POSTGRES_PASSWORD: homeranger
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U homeranger -d homeranger_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://homeranger:homeranger@localhost:5432/homeranger_test
      MIGRATION_DATABASE_URL: postgresql://homeranger:homeranger@localhost:5432/homeranger_test
      VITEST_INTEGRATION: "1"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.16.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Prisma generate
        run: pnpm --filter @homeranger/api prisma:generate
      # Applies 0001_init + the raw 0002_pgvector (CREATE EXTENSION vector +
      # vector(1024) columns + HNSW index). The container superuser owns the DB,
      # so CREATE EXTENSION succeeds on this throwaway pgvector instance.
      - name: Apply migrations
        run: pnpm --filter @homeranger/api prisma:deploy
      - name: Integration tests (real pgvector)
        run: pnpm test:integration

  e2e:
    runs-on: ${{ vars.RUNNER_LABEL_DEFAULT || 'ubuntu-latest' }}
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_DB: homeranger_test
          POSTGRES_USER: homeranger
          POSTGRES_PASSWORD: homeranger
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U homeranger -d homeranger_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      # The M4 inbound E2E adds a third Playwright webServer — the BullMQ worker
      # (pnpm --filter @homeranger/processor e2e:worker on :9090) — which
      # fail-fast-pings Redis at boot (worker.ts) and exits if it is missing.
      # Without this service the worker dies, port 9090 never opens, the worker
      # webServer startup times out, and the e2e job fails. Mirrors the postgres
      # service block above.
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      # The Playwright webServer chains prisma:deploy + db:seed + the api/web dev
      # servers. DB env points at the service container; CF_ACCESS_* are UNSET so
      # the api takes the dev-bypass path (no Cloudflare in CI). CI=true flips
      # reuseExistingServer off + retries to 1.
      DATABASE_URL: postgresql://homeranger:homeranger@localhost:5432/homeranger_test
      MIGRATION_DATABASE_URL: postgresql://homeranger:homeranger@localhost:5432/homeranger_test
      # The worker webServer reads REDIS_URL (default redis://localhost:6379) and
      # pings Redis at boot; the api webServer enqueues onto it. Point both at the
      # redis service container above so the inbound E2E can enqueue + consume.
      REDIS_URL: redis://localhost:6379
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.16.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Prisma generate
        run: pnpm --filter @homeranger/api prisma:generate
      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium
      - name: E2E (Playwright — webServer handles deploy + seed + boot)
        run: pnpm test:e2e

  ci-gate:
    # Single aggregate status: every job runs on every event now, so all six
    # must succeed. Stays as the one check to require in branch protection.
    needs: [secret-scan, check, api-unit, web-unit, api-integration, e2e]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Aggregate
        run: |
          assert_ok() { [ "$2" = "success" ] || { echo "$1 failed ($2)"; exit 1; }; }
          assert_ok secret-scan     "${{ needs.secret-scan.result }}"
          assert_ok check           "${{ needs.check.result }}"
          assert_ok api-unit        "${{ needs.api-unit.result }}"
          assert_ok web-unit        "${{ needs.web-unit.result }}"
          assert_ok api-integration "${{ needs.api-integration.result }}"
          assert_ok e2e             "${{ needs.e2e.result }}"
          echo "CI gate passed"
