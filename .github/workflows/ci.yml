# homescout CI — M2 core: secret-scan + typecheck/lint + api-unit (coverage) +
# api-integration (pgvector service container -> prisma migrate deploy ->
# test:integration). Grows per milestone: M3 adds E2E, M2+ adds the per-app
# image build (release.yml). Action SHAs pinned (mirrors Doxus).
name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secret-scan:
    runs-on: ${{ vars.RUNNER_LABEL_DEFAULT || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          set -euo pipefail
          VERSION=8.24.3
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" -o /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          sudo install /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version
      - name: Scan git history for secrets
        run: gitleaks detect --source . --config .gitleaks.toml --redact --no-banner

  check:
    runs-on: ${{ vars.RUNNER_LABEL_DEFAULT || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.16.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Generate the Prisma client first — backend-core typechecks against the
      # generated @prisma/client (models + enums). prisma.config.ts tolerates a
      # missing MIGRATION_DATABASE_URL, so generate needs no DB.
      - name: Prisma generate
        run: pnpm --filter @homescout/api prisma:generate
      - name: Typecheck
        run: pnpm typecheck
      - name: Lint
        run: pnpm lint

  api-unit:
    runs-on: ${{ vars.RUNNER_LABEL_DEFAULT || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.16.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Generate the Prisma client so backend-core's @prisma/client imports
      # resolve during the unit run (the drift test imports the generated enums).
      - name: Prisma generate
        env:
          MIGRATION_DATABASE_URL: postgresql://homescout:homescout@localhost:5432/homescout_test
        run: pnpm --filter @homescout/api prisma:generate
      - name: Unit tests + coverage
        run: pnpm test:coverage

  api-integration:
    runs-on: ${{ vars.RUNNER_LABEL_DEFAULT || 'ubuntu-latest' }}
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_DB: homescout_test
          POSTGRES_USER: homescout
          POSTGRES_PASSWORD: homescout
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U homescout -d homescout_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://homescout:homescout@localhost:5432/homescout_test
      MIGRATION_DATABASE_URL: postgresql://homescout:homescout@localhost:5432/homescout_test
      VITEST_INTEGRATION: "1"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.16.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Prisma generate
        run: pnpm --filter @homescout/api prisma:generate
      # Applies 0001_init + the raw 0002_pgvector (CREATE EXTENSION vector +
      # vector(1024) columns + HNSW index). The container superuser owns the DB,
      # so CREATE EXTENSION succeeds on this throwaway pgvector instance.
      - name: Apply migrations
        run: pnpm --filter @homescout/api prisma:deploy
      - name: Integration tests (real pgvector)
        run: pnpm test:integration

  ci-gate:
    needs: [secret-scan, check, api-unit, api-integration]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Aggregate
        run: |
          [ "${{ needs.secret-scan.result }}" = "success" ] || { echo "secret-scan failed"; exit 1; }
          [ "${{ needs.check.result }}" = "success" ] || { echo "check failed"; exit 1; }
          [ "${{ needs.api-unit.result }}" = "success" ] || { echo "api-unit failed"; exit 1; }
          [ "${{ needs.api-integration.result }}" = "success" ] || { echo "api-integration failed"; exit 1; }
          echo "CI gate passed"
