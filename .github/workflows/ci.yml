# homescout CI — lean M1 core (secret-scan + install/typecheck/lint).
# Grows per milestone: M2 adds unit + integration (docker pgvector), M3 adds E2E,
# M2+ adds the per-app image build (release.yml). Action SHAs pinned (mirrors Doxus).
name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secret-scan:
    runs-on: ${{ vars.RUNNER_LABEL_DEFAULT || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          set -euo pipefail
          VERSION=8.24.3
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" -o /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          sudo install /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version
      - name: Scan git history for secrets
        run: gitleaks detect --source . --config .gitleaks.toml --redact --no-banner

  check:
    runs-on: ${{ vars.RUNNER_LABEL_DEFAULT || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.16.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm typecheck
      - name: Lint
        run: pnpm lint

  ci-gate:
    needs: [secret-scan, check]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Aggregate
        run: |
          [ "${{ needs.secret-scan.result }}" = "success" ] || { echo "secret-scan failed"; exit 1; }
          [ "${{ needs.check.result }}" = "success" ] || { echo "check failed"; exit 1; }
          echo "CI gate passed"
