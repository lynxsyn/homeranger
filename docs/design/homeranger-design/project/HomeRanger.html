<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HomeRanger — Listings</title>
  <link rel="icon" href="assets/logo-mark.svg">
  <link rel="stylesheet" href="assets/colors_and_type.css">
  <link rel="stylesheet" href="assets/components.css">
  <link rel="stylesheet" href="app/styles.css">
  <!-- Leaflet (map view) -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <!-- Restore saved theme before paint to avoid a flash -->
  <script>
    try {
      var t = localStorage.getItem("hs-theme");
      if (t) document.documentElement.setAttribute("data-theme", t);
    } catch (e) {}
  </script>
  <!-- Lucide UMD (before Babel so window.lucide exists for <Icon>) -->
  <script src="https://unpkg.com/lucide@0.544.0/dist/umd/lucide.min.js"></script>
  <!-- React + Babel (pinned) -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="app/components.jsx"></script>
  <script type="text/babel" src="app/data.jsx"></script>
  <script type="text/babel" src="app/agent-data.jsx"></script>
  <script type="text/babel" src="app/campaign-data.jsx"></script>
  <script type="text/babel" src="app/settings.jsx"></script>
  <script type="text/babel" src="app/listings.jsx"></script>
  <script type="text/babel" src="app/map.jsx"></script>
  <script type="text/babel" src="app/agents.jsx"></script>
  <script type="text/babel" src="app/campaigns.jsx"></script>
  <script type="text/babel" src="app/sources.jsx"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    function useStored(key, initial) {
      const [v, setV] = useState(() => {
        try { return localStorage.getItem(key) || initial; } catch (e) { return initial; }
      });
      useEffect(() => { try { localStorage.setItem(key, v); } catch (e) {} }, [v]);
      return [v, setV];
    }

    function useStoredJSON(key, initial) {
      const [v, setV] = useState(() => {
        try {
          const raw = localStorage.getItem(key);
          return raw ? { ...initial, ...JSON.parse(raw) } : initial;
        } catch (e) { return initial; }
      });
      useEffect(() => { try { localStorage.setItem(key, JSON.stringify(v)); } catch (e) {} }, [v]);
      return [v, setV];
    }

    function useStoredArray(key, initial) {
      const [v, setV] = useState(() => {
        try {
          const raw = localStorage.getItem(key);
          return raw ? JSON.parse(raw) : initial;
        } catch (e) { return initial; }
      });
      useEffect(() => { try { localStorage.setItem(key, JSON.stringify(v)); } catch (e) {} }, [v]);
      return [v, setV];
    }

    function App() {
      const [theme, setTheme] = useStored("hs-theme", "light");
      const [view, setView] = useStored("hs-view", "table");
      const [tab, setTab] = useStored("hs-tab", "listings");
      const [searchFilter, setSearchFilter] = useState(null);
      const [agentFilter, setAgentFilter] = useState(null);
      const [sourceFilter, setSourceFilter] = useState(null);
      const [profile, setProfile] = useStoredJSON("hs-profile", BLANK_PROFILE);
      const [agents, setAgents] = useStoredArray("hs-agents-v2", SEED_AGENTS);
      const [dismissed, setDismissed] = useStoredArray("hs-dismissed", []);
      const [sending, setSending] = useStored("hs-sending", "on");
      const isLive = sending !== "off";
      const [pendingNew, setPendingNew] = useState(false);

      useEffect(() => {
        document.documentElement.setAttribute("data-theme", theme);
      }, [theme]);

      function goTab(id) {
        setSearchFilter(null);   // manual nav always shows the full set
        setAgentFilter(null);
        setSourceFilter(null);
        setTab(id);
      }

      function viewHomes(search) {
        setSourceFilter(null);
        setSearchFilter(search);
        setTab("listings");
      }

      // Drill from a source into the Listings table, filtered to its lots.
      function viewLots(source) {
        setSearchFilter(null);
        setAgentFilter(null);
        setSourceFilter({ id: source.id, name: source.name, kind: source.kind, domain: source.domain });
        setTab("listings");
      }

      function viewAgents(search) {
        setAgentFilter(search ? { name: search.name, outcodes: window.searchOutcodes(search), status: search.status } : null);
        setTab("agents");
      }

      // Merge approved agents into the store: new ones added, known ones
      // refreshed (keep replied/opted-out; otherwise mark awaiting + now).
      function addAgents(recs) {
        setAgents((prev) => {
          const byId = new Map(prev.map((a) => [a.id, a]));
          recs.forEach((r) => {
            const existing = byId.get(r.id);
            if (existing) {
              const status = existing.status === "replied" || existing.status === "opted_out"
                ? existing.status : "awaiting";
              byId.set(r.id, { ...existing, ...r, status, lastContact: "just now" });
            } else {
              byId.set(r.id, r);
            }
          });
          return Array.from(byId.values());
        });
      }

      // Remove a single agency from the list (its homes stay — see ConfirmRemove).
      function removeAgent(id) {
        setAgents((prev) => prev.filter((a) => a.id !== id));
      }

      // Remove a whole search: drop the agents it found, and HIDE (dismiss) the
      // homes it brought in — reversible from the Listings → Dismissed view.
      function removeSearch(search) {
        const codes = window.searchOutcodes(search).map((o) => o.toUpperCase());
        setAgents((prev) => prev.filter((a) =>
          a.searchId !== search.id && !codes.includes((a.outcode || "").toUpperCase())));
        const ids = window.matchSearch(search).map((l) => l.id);
        setDismissed((prev) => Array.from(new Set([...prev, ...ids])));
      }

      return (
        <div className="app">
          <header className="topbar">
            <div className="topbar__left">
              <button className="brand-btn" onClick={() => goTab("listings")} aria-label="HomeRanger — home">
                <Logo size={28} />
              </button>
              <nav className="nav" aria-label="Primary">
                <button aria-current={tab === "listings"} onClick={() => goTab("listings")}>Listings</button>
                <button aria-current={tab === "campaigns"} onClick={() => goTab("campaigns")}>Searches</button>
                <button aria-current={tab === "agents"} onClick={() => goTab("agents")}>Agents</button>
                <button aria-current={tab === "sources"} onClick={() => goTab("sources")}>Sources</button>
              </nav>
            </div>
            <div className="topbar__right">
              <Button variant="primary" size="sm" icon="search"
                onClick={() => { goTab("campaigns"); setPendingNew(true); }}>
                New search
              </Button>
              <UserMenu
                profile={profile}
                tab={tab}
                theme={theme}
                onNavigate={goTab}
                onToggleTheme={() => setTheme(theme === "dark" ? "light" : "dark")}
              />
            </div>
          </header>
          {tab === "settings"
            ? <SettingsScreen profile={profile} onSave={setProfile}
                sending={isLive}
                onToggleSending={() => setSending(isLive ? "off" : "on")} />
            : tab === "agents"
            ? <AgentsScreen
                agents={agents}
                sending={isLive}
                onToggleSending={() => setSending(isLive ? "off" : "on")}
                filter={agentFilter}
                onClearFilter={() => setAgentFilter(null)}
                onViewHomes={viewHomes}
                onRemoveAgent={removeAgent} />
            : tab === "sources"
            ? <SourcesScreen onViewLots={viewLots} />
            : tab === "listings"
            ? <ListingsScreen view={{ value: view, set: setView }}
                searchFilter={searchFilter} sourceFilter={sourceFilter}
                onClearFilter={() => { setSearchFilter(null); setSourceFilter(null); }}
                dismissed={dismissed} setDismissed={setDismissed} />
            : <CampaignsScreen
                agents={agents}
                sending={isLive}
                onToggleSending={() => setSending(isLive ? "off" : "on")}
                onAddAgents={addAgents}
                onViewAgents={viewAgents}
                onViewHomes={viewHomes}
                onRemoveSearch={removeSearch}
                pendingNew={pendingNew}
                onConsumedNew={() => setPendingNew(false)} />}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
